<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#020304" />
    <title>CONTROL</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="stage" class="stage" aria-live="polite"></main>
    <script type="module">
      const configUrl = new URL("./asset-cache-config.js", window.location.href);
      configUrl.searchParams.set("load", String(Date.now()));
      let configResponse;
      try {
        configResponse = await fetch(configUrl, {
          cache: "no-store",
          credentials: "same-origin",
        });
      } catch {
        configResponse = await fetch("./asset-cache-config.js");
      }
      if (!configResponse.ok) {
        throw new Error(`Cache config: ${configResponse.status}`);
      }

      const configSource = await configResponse.text();
      (0, eval)(configSource);

      const appUrl = new URL("./app.js", window.location.href);
      appUrl.searchParams.set(
        "version",
        globalThis.CONTROL_ASSET_CACHE.version,
      );
      try {
        await import(appUrl.href);
      } catch {
        await import("./app.js");
      }
    </script>
  </body>
</html>
